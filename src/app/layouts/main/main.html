<div class="flex h-screen bg-black overflow-hidden">
  <!-- Menú lateral - oculto en móvil, visible en desktop -->
  <div class="hidden md:flex flex-col w-60 h-screen bg-black flex-shrink-0">
    <div class="flex justify-center items-center p-4 mt-7">
      <img width="120" src="/images/logo_b.png" alt="Logo" />
    </div>
    <app-menu />
    <div class="flex justify-center items-center p-4 mt-auto">
      <p-button
        label="Cerrar Sesión"
        class="text-black"
        severity="secondary"
        (onClick)="confirmLogout()"
      />
    </div>
    <div class="text-xs text-gray-400 text-center mb-5">© Momentum 2025</div>
  </div>

  <!-- Contenido principal -->
  <div class="flex-1 bg-white m-3 rounded-3xl p-5 flex flex-col relative min-w-0 overflow-hidden">
    <!-- Barra superior: selector de empresa -->
    <div class="flex items-center justify-end gap-2 mb-4 px-10">
      <span class="text-sm text-gray-600">Empresa:</span>
      <span class="px-2 py-1 rounded-full bg-blue-50 text-blue-700 text-sm font-medium">
        {{ tenantName() || 'No seleccionada' }}
      </span>
      <p-button icon="pi pi-building" label="Cambiar" [text]="true" (onClick)="changeCompany()" />
    </div>
    <!-- Contenido de la página -->
    <div class="pt-0 flex-1 overflow-y-auto overflow-x-hidden">
      <router-outlet />
    </div>
  </div>

  <!-- Menú hamburguesa para móvil -->
  <div class="md:hidden">
    <app-menu />
  </div>
</div>

<p-confirmdialog />
<p-toast [life]="5000" />
