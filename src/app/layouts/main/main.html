<div class="flex h-screen bg-black">
  <!-- Menú lateral - oculto en móvil, visible en desktop -->
  <div class="hidden md:flex flex-col w-60 h-screen bg-black">
    <div class="flex justify-center items-center p-4 mt-7">
      <img width="120" src="/images/logo_b.png" alt="Logo" />
    </div>
    <app-menu />
    <div class="flex justify-center items-center p-4 mt-auto">
      <p-button
        label="Cerrar Sesión"
        class="text-black"
        severity="secondary"
        (onClick)="confirmLogout()"
      />
    </div>
    <div class="text-xs text-gray-400 text-center mb-5">© Maya Agent 2025</div>
  </div>

  <!-- Contenido principal -->
  <div class="flex-1 bg-white m-3 rounded-3xl p-5 flex flex-col relative">
    <!-- Contenido de la página -->
    <div class="flex-1">
      <router-outlet />
    </div>
  </div>

  <!-- Menú hamburguesa para móvil -->
  <div class="md:hidden">
    <app-menu />
  </div>
</div>

<p-confirmdialog />
