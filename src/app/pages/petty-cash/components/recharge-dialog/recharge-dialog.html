<p-dialog
  [visible]="visible()"
  (visibleChange)="visible() && onClose()"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '28rem', maxWidth: '95vw' }"
  (onHide)="reset()"
>
  <ng-template pTemplate="header">
    <span class="font-semibold flex items-center gap-2">
      <i class="pi pi-wallet text-green-600"></i>
      Recargar Dinero
    </span>
  </ng-template>

  <div class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >MONTO (S/)</label
      >
      <p-inputNumber
        [ngModel]="amount()"
        (ngModelChange)="amount.set($event)"
        [min]="0"
        [minFractionDigits]="2"
        [maxFractionDigits]="2"
        mode="currency"
        currency="PEN"
        locale="es-PE"
        class="w-full"
        inputId="recharge-amount"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >DESCRIPCIÓN</label
      >
      <input
        pInputText
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        placeholder="Ej. Reposición semanal"
        class="w-full"
        id="recharge-description"
      />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button
      pButton
      label="Cancelar"
      icon="pi pi-times"
      class="p-button-text"
      (click)="onClose()"
      aria-label="Cancelar"
    ></button>
    <button
      pButton
      label="Confirmar Ingreso"
      icon="pi pi-check"
      severity="success"
      (click)="onSubmit()"
      [disabled]="!description().trim() || amount() <= 0"
      aria-label="Confirmar ingreso"
    ></button>
  </ng-template>
</p-dialog>
