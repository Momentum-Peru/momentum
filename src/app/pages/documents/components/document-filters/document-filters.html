<div class="w-full">
  <p-card class="shadow-sm">
    <form [formGroup]="filtersForm" (ngSubmit)="applyFilters()" class="space-y-4">
      <!-- Filtros Básicos -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Proyecto -->
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-2">Proyecto</label>
          <p-select
            formControlName="proyectoId"
            [options]="projectOptions"
            placeholder="Seleccionar proyecto"
            class="w-full"
          >
          </p-select>
        </div>

        <!-- Categoría -->
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-2">Categoría</label>
          <p-select
            formControlName="categoria"
            [options]="categoryOptions"
            placeholder="Seleccionar categoría"
            class="w-full"
          >
          </p-select>
        </div>

        <!-- Número de Documento -->
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-2">Número de Documento</label>
          <p-inputNumber
            formControlName="numeroDocumento"
            [useGrouping]="false"
            [min]="1"
            placeholder="Número de documento"
            class="w-full"
          >
          </p-inputNumber>
        </div>

        <!-- Estado -->
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-2">Estado</label>
          <p-select
            formControlName="isActive"
            [options]="statusOptions"
            placeholder="Seleccionar estado"
            class="w-full"
          >
          </p-select>
        </div>
      </div>

      <!-- Botón para mostrar filtros avanzados -->
      <div class="flex justify-center">
        <p-button
          [label]="
            showAdvancedFilters() ? 'Ocultar Filtros Avanzados' : 'Mostrar Filtros Avanzados'
          "
          icon="pi pi-filter"
          severity="secondary"
          [text]="true"
          (onClick)="toggleAdvancedFilters()"
          [loading]="loading"
        >
        </p-button>
      </div>

      <!-- Filtros Avanzados -->
      @if (showAdvancedFilters()) {
      <div class="space-y-4">
        <p-divider></p-divider>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Serie -->
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-700 mb-2">Serie</label>
            <p-inputNumber
              formControlName="serie"
              [useGrouping]="false"
              [min]="1"
              placeholder="Serie del documento"
              class="w-full"
            >
            </p-inputNumber>
          </div>

          <!-- Fecha Emisión Desde -->
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-700 mb-2">Fecha Emisión Desde</label>
            <p-datepicker
              formControlName="fechaEmisionDesde"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full"
            >
            </p-datepicker>
          </div>

          <!-- Fecha Emisión Hasta -->
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-700 mb-2">Fecha Emisión Hasta</label>
            <p-datepicker
              formControlName="fechaEmisionHasta"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full"
            >
            </p-datepicker>
          </div>

          <!-- Fecha Vencimiento Desde -->
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-700 mb-2">Fecha Vencimiento Desde</label>
            <p-datepicker
              formControlName="fechaVencimientoDesde"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full"
            >
            </p-datepicker>
          </div>

          <!-- Fecha Vencimiento Hasta -->
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-700 mb-2">Fecha Vencimiento Hasta</label>
            <p-datepicker
              formControlName="fechaVencimientoHasta"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full"
            >
            </p-datepicker>
          </div>

          <!-- Total Mínimo -->
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-700 mb-2">Total Mínimo</label>
            <p-inputNumber
              formControlName="totalMinimo"
              [min]="0"
              [maxFractionDigits]="2"
              mode="currency"
              currency="PEN"
              locale="es-PE"
              placeholder="0.00"
              class="w-full"
            >
            </p-inputNumber>
          </div>

          <!-- Total Máximo -->
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-700 mb-2">Total Máximo</label>
            <p-inputNumber
              formControlName="totalMaximo"
              [min]="0"
              [maxFractionDigits]="2"
              mode="currency"
              currency="PEN"
              locale="es-PE"
              placeholder="0.00"
              class="w-full"
            >
            </p-inputNumber>
          </div>
        </div>
      </div>
      }

      <!-- Botones de Acción -->
      <div class="flex justify-end gap-3 pt-4 border-t">
        <p-button
          label="Limpiar Filtros"
          icon="pi pi-times"
          severity="secondary"
          [text]="true"
          (onClick)="clearFilters()"
          [disabled]="loading"
        >
        </p-button>

        <p-button label="Aplicar Filtros" icon="pi pi-search" type="submit" [loading]="loading">
        </p-button>
      </div>
    </form>
  </p-card>
</div>
