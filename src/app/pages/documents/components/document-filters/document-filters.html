<div class="w-full">
  <p-toast></p-toast>
  <p-card class="shadow-sm">
    <form [formGroup]="filtersForm" (ngSubmit)="applyFilters()" class="space-y-4">
      <!-- Filtros Básicos -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Proyecto -->
        <div class="flex flex-col">
          <label for="filterProyecto" class="text-sm font-medium text-gray-700 dark:text-white mb-2">Proyecto</label>
          <p-select
            id="filterProyecto"
            formControlName="proyectoId"
            [options]="projectOptions()"
            placeholder="Seleccionar proyecto"
            class="w-full"
          >
          </p-select>
        </div>

        <!-- Categoría -->
        <div class="flex flex-col">
          <label for="filterCategoria" class="text-sm font-medium text-gray-700 dark:text-white mb-2">Categoría</label>
          <p-select
            id="filterCategoria"
            formControlName="categoria"
            [options]="categoryOptions"
            placeholder="Seleccionar categoría"
            class="w-full"
          >
          </p-select>
        </div>

        <!-- Número de Documento -->
        <div class="flex flex-col">
          <label for="filterNumeroDocumento" class="text-sm font-medium text-gray-700 dark:text-white mb-2"
            >Número de Documento</label
          >
          <p-inputNumber
            inputId="filterNumeroDocumento"
            formControlName="numeroDocumento"
            [useGrouping]="false"
            [min]="1"
            placeholder="Número de documento"
            class="w-full"
          >
          </p-inputNumber>
        </div>

        <!-- Estado -->
        <div class="flex flex-col">
          <label for="filterEstado" class="text-sm font-medium text-gray-700 dark:text-white mb-2">Estado</label>
          <p-select
            inputId="filterEstado"
            formControlName="isActive"
            [options]="statusOptions"
            placeholder="Seleccionar estado"
            class="w-full"
          >
          </p-select>
        </div>
      </div>

      <!-- Botón para mostrar filtros avanzados -->
      <div class="flex justify-center">
        <p-button
          [label]="
            showAdvancedFilters() ? 'Ocultar Filtros Avanzados' : 'Mostrar Filtros Avanzados'
          "
          icon="pi pi-filter"
          severity="secondary"
          [text]="true"
          (onClick)="toggleAdvancedFilters()"
          [loading]="loading"
          class="w-full lg:w-auto"
          styleClass="w-full lg:w-auto"
        >
        </p-button>
      </div>

      <!-- Filtros Avanzados -->
      @if (showAdvancedFilters()) {
      <div class="space-y-4">
        <p-divider></p-divider>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Serie -->
          <div class="flex flex-col">
            <label for="filterSerie" class="text-sm font-medium text-gray-700 dark:text-white mb-2">Serie</label>
            <input
              id="filterSerie"
              pInputText
              formControlName="serie"
              placeholder="Serie del documento"
              class="w-full lg:w-auto"
              styleClass="w-full lg:w-auto"
            />
          </div>

          <!-- Fecha Emisión Desde -->
          <div class="flex flex-col">
            <label for="filterFechaEmisionDesde" class="text-sm font-medium text-gray-700 dark:text-white mb-2"
              >Fecha Emisión Desde</label
            >
            <p-datepicker
              inputId="filterFechaEmisionDesde"
              formControlName="fechaEmisionDesde"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full lg:w-auto"
              styleClass="w-full lg:w-auto"
            >
            </p-datepicker>
          </div>

          <!-- Fecha Emisión Hasta -->
          <div class="flex flex-col">
            <label for="filterFechaEmisionHasta" class="text-sm font-medium text-gray-700 dark:text-white mb-2"
              >Fecha Emisión Hasta</label
            >
            <p-datepicker
              inputId="filterFechaEmisionHasta"
              formControlName="fechaEmisionHasta"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full lg:w-auto"
              styleClass="w-full lg:w-auto"
            >
            </p-datepicker>
          </div>

          <!-- Fecha Vencimiento Desde -->
          <div class="flex flex-col">
            <label for="filterFechaVencimientoDesde" class="text-sm font-medium text-gray-700 dark:text-white mb-2"
              >Fecha Vencimiento Desde</label
            >
            <p-datepicker
              inputId="filterFechaVencimientoDesde"
              formControlName="fechaVencimientoDesde"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full lg:w-auto"
              styleClass="w-full lg:w-auto"
            >
            </p-datepicker>
          </div>

          <!-- Fecha Vencimiento Hasta -->
          <div class="flex flex-col">
            <label for="filterFechaVencimientoHasta" class="text-sm font-medium text-gray-700 dark:text-white mb-2"
              >Fecha Vencimiento Hasta</label
            >
            <p-datepicker
              inputId="filterFechaVencimientoHasta"
              formControlName="fechaVencimientoHasta"
              placeholder="Seleccionar fecha"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              class="w-full"
            >
            </p-datepicker>
          </div>

          <!-- Total Mínimo -->
          <div class="flex flex-col">
            <label for="filterTotalMinimo" class="text-sm font-medium text-gray-700 dark:text-white mb-2"
              >Total Mínimo</label
            >
            <p-inputNumber
              inputId="filterTotalMinimo"
              formControlName="totalMinimo"
              [min]="0"
              [maxFractionDigits]="2"
              mode="currency"
              currency="PEN"
              locale="es-PE"
              placeholder="0.00"
              class="w-full"
            >
            </p-inputNumber>
          </div>

          <!-- Total Máximo -->
          <div class="flex flex-col">
            <label for="filterTotalMaximo" class="text-sm font-medium text-gray-700 dark:text-white mb-2"
              >Total Máximo</label
            >
            <p-inputNumber
              inputId="filterTotalMaximo"
              formControlName="totalMaximo"
              [min]="0"
              [maxFractionDigits]="2"
              mode="currency"
              currency="PEN"
              locale="es-PE"
              placeholder="0.00"
              class="w-full"
            >
            </p-inputNumber>
          </div>
        </div>
      </div>
      }

      <!-- Botones de Acción -->
      <div class="flex justify-end gap-3 pt-4 border-t">
        <p-button
          label="Limpiar Filtros"
          icon="pi pi-times"
          severity="secondary"
          [text]="true"
          (onClick)="clearFilters()"
          [disabled]="loading"
          class="w-full lg:w-auto"
          styleClass="w-full lg:w-auto"
        >
        </p-button>

        <p-button
          label="Aplicar Filtros"
          icon="pi pi-search"
          type="submit"
          [loading]="loading"
          class="w-full lg:w-auto"
          styleClass="w-full lg:w-auto"
        >
        </p-button>
      </div>
    </form>
  </p-card>
</div>
