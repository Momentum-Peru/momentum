<div class="p-4">
  <!-- Toast para notificaciones -->
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <!-- Header con título y botón de crear -->
  <div class="mb-6">
    <p-toolbar>
      <ng-template pTemplate="left">
        <div class="flex items-center gap-3">
          <i class="pi pi-file text-2xl text-blue-600"></i>
          <h1 class="text-2xl font-bold text-gray-800">Documentos Tributarios</h1>
        </div>
      </ng-template>
      <ng-template pTemplate="right">
        <p-button
          label="Nuevo Documento"
          icon="pi pi-plus"
          (onClick)="openCreateForm()"
          class="p-button-success"
        >
        </p-button>
      </ng-template>
    </p-toolbar>
  </div>

  <!-- Filtros -->
  <app-document-filters
    [projects]="projects()"
    [loading]="loading()"
    (filtersApplied)="onFiltersApplied($event)"
  >
  </app-document-filters>

  <!-- Lista de documentos -->
  <div class="mt-6">
    <app-document-list
      [documents]="documents()"
      [loading]="loading()"
      [totalRecords]="totalRecords()"
      [currentPage]="currentPage()"
      [pageSize]="pageSize()"
      (pageChange)="onPageChange($event)"
      (editDocument)="openEditForm($event)"
      (deleteDocument)="confirmDelete($event)"
      [trackByFn]="trackByDocumentId"
    >
    </app-document-list>
  </div>

  <!-- Diálogo de formulario -->
  <p-dialog
    [visible]="showFormDialog()"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '90vw', maxWidth: '800px' }"
    header="{{ editingDocument() ? 'Editar Documento' : 'Nuevo Documento' }}"
    (onHide)="closeFormDialog()"
  >
    <app-document-form
      [document]="editingDocument()"
      [projects]="projects()"
      (documentSaved)="onDocumentSaved()"
      (cancel)="closeFormDialog()"
    >
    </app-document-form>
  </p-dialog>
</div>
