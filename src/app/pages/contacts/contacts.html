<div class="p-4 md:p-6 max-w-full overflow-hidden">
  <!-- Header -->
  <div class="mb-6 md:mb-8">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">Contactos</h1>
    <p class="text-gray-600 text-sm md:text-base">
      Gestiona tus contactos locales y sincroniza con Google Contacts
    </p>
  </div>

  <!-- Botones de acción principales -->
  <div class="mb-4 md:mb-6">
    <div class="flex flex-col sm:flex-row gap-2 md:gap-3">
      <p-button
        label="Nuevo Contacto"
        icon="pi pi-plus"
        (onClick)="showCreateForm()"
        [disabled]="showForm() || showOAuth()"
        class="w-full sm:w-auto"
      />

      <p-button
        label="Conectar Google Contacts"
        icon="pi pi-google"
        severity="secondary"
        (onClick)="showOAuthButtons()"
        [disabled]="showForm() || showOAuth()"
        class="w-full sm:w-auto"
      />

      <p-button
        label="Refrescar"
        icon="pi pi-refresh"
        severity="secondary"
        (onClick)="refreshContacts()"
        [loading]="isLoading()"
        class="w-full sm:w-auto"
      />
    </div>
  </div>

  <!-- Formulario de contacto -->
  @if (showForm()) {
  <div class="mb-4 md:mb-6">
    <app-contact-form
      [contact]="editingContact()"
      [isEditing]="isEditing()"
      [isLoading]="isSubmitting()"
      (onSubmit)="handleFormSubmit($event)"
      (onCancel)="cancelOperation()"
    />
  </div>
  }

  <!-- Botones OAuth2 -->
  @if (showOAuth()) {
  <div class="mb-4 md:mb-6">
    <app-google-contacts-oauth
      (onOAuthSuccess)="onOAuthSuccess($event)"
      (onOAuthError)="onOAuthError($event)"
    />
  </div>
  }

  <!-- Lista de contactos -->
  <div class="mb-4 md:mb-6">
    <app-contacts-list
      [contacts]="contacts()"
      [isLoading]="isLoading()"
      (onEdit)="editContact($event)"
      (onDelete)="handleContactDelete($event)"
      (onRefresh)="refreshContacts()"
      (onSearch)="onSearch($event)"
      (onFilterChange)="onFilterChange($event)"
    />
  </div>

  <!-- Toast para mensajes -->
  <p-toast></p-toast>
</div>
