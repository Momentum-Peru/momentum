<div class="p-4 sm:p-6 max-w-6xl mx-auto">
  <p-toast [life]="5000"></p-toast>
  <div class="flex items-center justify-between gap-4 mb-6 text-slate-800">
    <h1 class="text-2xl font-bold m-0"><i class="pi pi-shopping-bag mr-2 text-primary"></i> Órdenes de Compra</h1>
    <button pButton label="Nueva Orden" icon="pi pi-plus" class="p-button-primary"></button>
  </div>
  
  @if (loading()) {
    <div class="flex justify-center py-12">
      <i class="pi pi-spin pi-spinner text-4xl text-primary"></i>
    </div>
  } @else {
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <p-table [value]="orders()" styleClass="p-datatable-sm" [tableStyle]="{ 'min-width': '50rem' }" [paginator]="true" [rows]="10" [showCurrentPageReport]="true" currentPageReportTemplate="Mostrando del {first} al {last} de {totalRecords} órdenes">
        <ng-template pTemplate="header">
          <tr class="bg-slate-50 border-b border-slate-200 text-slate-700">
            <th class="p-4 font-semibold text-left">N° Orden</th>
            <th class="p-4 font-semibold text-left">Proveedor</th>
            <th class="p-4 font-semibold text-right">Total</th>
            <th class="p-4 font-semibold text-center">Fecha Emisión</th>
            <th class="p-4 font-semibold text-center">Estado</th>
            <th class="p-4 font-semibold text-center w-24">Acciones</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6" class="text-center py-12 text-slate-500">
              <i class="pi pi-inbox text-4xl mb-4 text-slate-300 block"></i>
              No hay órdenes de compra registradas.
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
          <tr class="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
            <td class="p-4">
              <span class="font-mono font-bold text-slate-700 bg-slate-100 px-2 py-1 rounded">{{ row.number }}</span>
            </td>
            <td class="p-4 text-sm font-medium text-slate-800">{{ providerName(row) }}</td>
            <td class="p-4 text-right text-sm font-bold text-slate-800">{{ row.totalAmount | currency: 'PEN':'symbol' }}</td>
            <td class="p-4 text-center text-sm text-slate-600">{{ row.issueDate | date: 'dd/MM/yyyy' }}</td>
            <td class="p-4 text-center">
              <p-tag [value]="row.status" [severity]="row.status === 'emitida' ? 'success' : 'info'"></p-tag>
            </td>
            <td class="p-4 text-center">
              <button pButton icon="pi pi-eye" class="p-button-text p-button-sm p-button-info" pTooltip="Ver Detalle"></button>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  }
</div>
