<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div class="text-center">
      <!-- Logo o icono -->
      <div class="mx-auto h-12 w-12 flex items-center justify-center">
        <i class="pi pi-google text-4xl text-blue-600"></i>
      </div>

      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">Procesando Conexión</h2>

      <p class="mt-2 text-sm text-gray-600">Conectando con Google Contacts...</p>
    </div>

    <!-- Estado de carga -->
    @if (isLoading()) {
    <div class="text-center">
      <div class="mx-auto h-16 w-16 flex items-center justify-center">
        <i class="pi pi-spin pi-spinner text-3xl text-blue-600"></i>
      </div>
      <p class="mt-4 text-gray-600">Procesando autorización...</p>
    </div>
    }

    <!-- Estado de éxito -->
    @if (isSuccess()) {
    <div class="text-center">
      <div class="mx-auto h-16 w-16 flex items-center justify-center">
        <i class="pi pi-check-circle text-4xl text-green-600"></i>
      </div>
      <h3 class="mt-4 text-lg font-medium text-gray-900">¡Conexión Exitosa!</h3>
      <p class="mt-2 text-sm text-gray-600">{{ message() }}</p>

      <div class="mt-6">
        <p-button
          label="Volver a Contactos"
          icon="pi pi-arrow-left"
          (onClick)="goBackToContacts()"
          class="w-full"
        />
      </div>
    </div>
    }

    <!-- Estado de error -->
    @if (isError()) {
    <div class="text-center">
      <div class="mx-auto h-16 w-16 flex items-center justify-center">
        <i class="pi pi-times-circle text-4xl text-red-600"></i>
      </div>
      <h3 class="mt-4 text-lg font-medium text-gray-900">Error de Conexión</h3>
      <p class="mt-2 text-sm text-gray-600">{{ errorMessage() }}</p>

      <div class="mt-6">
        <p-button
          label="Volver a Contactos"
          icon="pi pi-arrow-left"
          severity="secondary"
          (onClick)="goBackToContacts()"
          class="w-full"
        />
      </div>
    </div>
    }
  </div>
</div>
