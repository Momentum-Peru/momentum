<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="p-4 space-y-4">
  <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 m-0">Ubicaciones</h1>
      <p class="text-slate-600 mt-1">Lugares de almacenamiento de productos</p>
    </div>
    <div class="mt-4 md:mt-0">
      <button
        pButton
        label="Nueva Ubicación"
        icon="pi pi-plus"
        class="p-button-primary"
        (click)="openNew()"
      ></button>
    </div>
  </div>

  <p-card>
    <p-table
      #dt
      [value]="locations()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando del {first} al {last} de {totalRecords} ubicaciones"
      [rowsPerPageOptions]="[10, 25, 50]"
      [globalFilterFields]="['name', 'description']"
      responsiveLayout="scroll"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="caption">
        <div class="flex justify-between items-center pb-4">
          <p-iconfield iconPosition="left" class="w-full md:w-auto">
            <p-inputicon class="pi pi-search"></p-inputicon>
            <input
              pInputText
              type="text"
              (input)="dt.filterGlobal($any($event.target).value, 'contains')"
              placeholder="Buscar por nombre..."
              class="w-full md:w-80"
            />
          </p-iconfield>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Nombre <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="description">Descripción <p-sortIcon field="description"></p-sortIcon></th>
          <th pSortableColumn="isActive">Estado <p-sortIcon field="isActive"></p-sortIcon></th>
          <th class="w-32">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-loc>
        <tr
          class="cursor-pointer hover:bg-primary-50 transition-colors duration-150"
          (click)="viewLocation(loc)"
        >
          <td class="font-medium text-slate-800">
            <div class="flex items-center gap-2">
              <i class="pi pi-map-marker text-primary-500"></i>
              {{ loc.name }}
            </div>
          </td>
          <td class="text-slate-500 text-sm">{{ loc.description || '-' }}</td>
          <td>
            <span
              class="px-2 py-1 text-xs rounded-full font-medium"
              [ngClass]="{
                'bg-green-100 text-green-700': loc.isActive,
                'bg-red-100 text-red-700': !loc.isActive
              }"
            >
              {{ loc.isActive ? 'Activa' : 'Inactiva' }}
            </span>
          </td>
          <td>
            <div class="flex gap-1" (click)="$event.stopPropagation()">
              <button
                pButton
                icon="pi pi-eye"
                class="p-button-text p-button-sm p-button-secondary"
                (click)="viewLocation(loc)"
                pTooltip="Ver stock"
              ></button>
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-text p-button-sm p-button-warning"
                (click)="openEdit(loc)"
                pTooltip="Editar"
              ></button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-text p-button-sm p-button-danger"
                (click)="confirmDelete(loc)"
                pTooltip="Eliminar"
              ></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="text-center py-8 text-slate-500">
            No se encontraron ubicaciones.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<!-- Dialog: crear / editar ubicación -->
<p-dialog
  [header]="editingId() ? 'Editar Ubicación' : 'Nueva Ubicación'"
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  [modal]="true"
  [style]="{ width: '480px' }"
  [draggable]="false"
>
  <div class="space-y-4 pt-2">
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-slate-700">Nombre *</label>
      <input
        pInputText
        [value]="form().name"
        (input)="updateForm('name', $any($event.target).value)"
        placeholder="Ej: Almacén principal, Bodega norte..."
        class="w-full"
      />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-slate-700">Descripción</label>
      <textarea
        pTextarea
        [value]="form().description"
        (input)="updateForm('description', $any($event.target).value)"
        placeholder="Descripción opcional de la ubicación"
        rows="3"
        class="w-full"
      ></textarea>
    </div>

    <div class="flex items-center gap-2">
      <p-checkbox
        [binary]="true"
        [ngModel]="form().isActive"
        (ngModelChange)="updateForm('isActive', $event)"
        inputId="isActive"
      ></p-checkbox>
      <label for="isActive" class="text-sm text-slate-700">Ubicación activa</label>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" class="p-button-outlined p-button-secondary" (click)="closeDialog()"></button>
    <button pButton label="Guardar" icon="pi pi-check" [loading]="saving()" (click)="save()"></button>
  </ng-template>
</p-dialog>
