<div class="p-4 md:p-6 max-w-full overflow-hidden">
  <!-- Header -->
  <div class="mb-6 md:mb-8">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">Cuentas de Email</h1>
    <p class="text-gray-600 text-sm md:text-base">
      Gestiona tus cuentas de email SMTP, IMAP y OAuth2
    </p>
  </div>

  <!-- Botones de acción principales -->
  <div class="mb-4 md:mb-6">
    <div class="flex flex-col sm:flex-row gap-2 md:gap-3">
      <p-button
        label="Nueva Cuenta Manual"
        icon="pi pi-plus"
        (onClick)="showCreateForm()"
        [disabled]="showForm() || showOAuth()"
        class="w-full sm:w-auto"
      />

      <p-button
        label="Conectar con OAuth2"
        icon="pi pi-shield"
        severity="secondary"
        (onClick)="showOAuthButtons()"
        [disabled]="showForm() || showOAuth()"
        class="w-full sm:w-auto"
      />

      <p-button
        label="Refrescar"
        icon="pi pi-refresh"
        severity="secondary"
        (onClick)="refreshAccounts()"
        [loading]="isLoading()"
        class="w-full sm:w-auto"
      />
    </div>
  </div>

  <!-- Formulario de cuenta -->
  @if (showForm()) {
  <div class="mb-4 md:mb-6">
    <app-email-account-form
      [account]="editingAccount()"
      [isEditing]="isEditing()"
      [isLoading]="isSubmitting()"
      (onSubmit)="handleFormSubmit($event)"
      (onCancel)="cancelOperation()"
    />
  </div>
  }

  <!-- Botones OAuth2 -->
  @if (showOAuth()) {
  <div class="mb-4 md:mb-6">
    <app-oauth-buttons
      (onOAuthSuccess)="onOAuthSuccess($event)"
      (onOAuthError)="onOAuthError($event)"
    />
  </div>
  }

  <!-- Lista de cuentas -->
  <div class="mb-4 md:mb-6">
    <app-email-accounts-list
      [accounts]="accounts()"
      [isLoading]="isLoading()"
      (onEdit)="editAccount($event)"
      (onTest)="testAccount($event)"
      (onDelete)="handleAccountDelete($event)"
      (onRefresh)="refreshAccounts()"
    />
  </div>

  <!-- Modal de test SMTP -->
  <app-smtp-test-modal
    [visible]="showTestModal()"
    [account]="testingAccount()"
    (onClose)="showTestModal.set(false)"
    (onTestComplete)="onTestComplete($event)"
  />

  <!-- Toast para mensajes -->
  <p-toast></p-toast>
</div>
