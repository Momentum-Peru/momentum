<div class="p-6 flex items-center justify-center min-h-[60vh]">
  <p-card class="w-full max-w-2xl">
    <ng-template pTemplate="header">
      <div class="flex items-center gap-2">
        <i class="pi pi-building text-blue-600"></i>
        <span class="text-lg font-semibold text-gray-800 dark:text-gray-200">Selecciona tu empresa</span>
      </div>
    </ng-template>

    <div class="space-y-4">
      <div class="flex gap-2 items-center">
        <input
          pInputText
          placeholder="Buscar por nombre o código"
          [ngModel]="query()"
          (ngModelChange)="setQuery($event)"
          class="flex-1"
        />
        <button pButton icon="pi pi-refresh" [text]="true" (click)="load()" aria-label="Refrescar lista"></button>
      </div>

      @if (loading()) {
      <div class="flex items-center justify-center py-10">
        <p-progressSpinner></p-progressSpinner>
      </div>
      } @else {
      <p-select
        [options]="filtered()"
        optionLabel="name"
        optionValue="_id"
        [ngModel]="selectedId()"
        (ngModelChange)="selectedId.set($event)"
        placeholder="Seleccione una empresa"
        class="w-full"
        appendTo="body"
      ></p-select>
      }

      <div class="flex justify-end gap-2 pt-2">
        <button pButton icon="pi pi-times" label="Cancelar" [text]="true" routerLink="/dashboard" aria-label="Cancelar"></button>
        <button pButton icon="pi pi-check" label="Continuar" (click)="confirm()" aria-label="Continuar"></button>
      </div>
    </div>
  </p-card>
</div>
