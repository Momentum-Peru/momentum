<div class="space-y-4">
  <!-- Crear Tarea Rápida -->
  <div
    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4"
  >
    <h3 class="text-sm font-semibold text-blue-600 dark:text-blue-400 mb-3 flex items-center gap-2">
      <i class="pi pi-plus-circle"></i>
      Crear Tarea Rápida
    </h3>
    <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-center">
      <div class="md:col-span-1 flex justify-center">
        <p-avatar
          [image]="currentUser?.profilePicture"
          [label]="getInitials(currentUser?.name)"
          shape="circle"
          [style]="{
            'background-color': '#F8FAFC',
            color: '#64748B',
            'font-weight': 'bold',
            width: '38px',
            height: '38px',
            'font-size': '14px',
            border: '2px solid #F1F5F9',
          }"
          [pTooltip]="currentUser?.name || 'Usuario Actual'"
        ></p-avatar>
      </div>
      <div class="md:col-span-7 xl:col-span-4">
        <input
          type="text"
          pInputText
          [(ngModel)]="newTaskTitle"
          placeholder="Escribe la tarea..."
          class="w-full h-11 !border-gray-200 !rounded-xl !bg-gray-50/50 hover:!bg-gray-50 focus:!bg-white transition-all shadow-none text-sm px-4"
          (keyup.enter)="createTask()"
        />
      </div>
      <div class="md:col-span-6 xl:col-span-4">
        <p-select
          [options]="members"
          [(ngModel)]="selectedAssignee"
          optionLabel="name"
          placeholder="Asignar a..."
          styleClass="w-full !border-gray-200 !rounded-xl !bg-gray-50/50 hover:!bg-gray-50 focus:!bg-white transition-all shadow-none h-11 flex items-center"
          [appendTo]="'body'"
          [filter]="true"
          filterBy="name,email"
          [showClear]="true"
        >
          <ng-template let-user pTemplate="selectedItem">
            <div class="flex items-center gap-2" *ngIf="user">
              <p-avatar
                [image]="user.profilePicture"
                [label]="getInitials(user.name)"
                shape="circle"
                [style]="{
                  'background-color': '#EEF2FF',
                  color: '#4F46E5',
                  width: '24px',
                  height: '24px',
                }"
              ></p-avatar>
              <span class="truncate text-sm">{{ user.name }}</span>
            </div>
          </ng-template>
          <ng-template let-user pTemplate="item">
            <div class="flex items-center gap-2">
              <p-avatar
                [image]="user.profilePicture"
                [label]="getInitials(user.name)"
                shape="circle"
                [style]="{ 'background-color': '#EEF2FF', color: '#4F46E5' }"
              ></p-avatar>
              <div class="flex flex-col overflow-hidden">
                <span class="text-sm font-medium truncate">{{ user.name }}</span>
                <span class="text-[10px] text-gray-500 truncate">{{ user.email }}</span>
              </div>
            </div>
          </ng-template>
        </p-select>
      </div>
      <div class="md:col-span-5 xl:col-span-2">
        <p-datepicker
          [(ngModel)]="selectedDueDate"
          [showIcon]="true"
          iconDisplay="input"
          placeholder="Vencimiento"
          [minDate]="today"
          dateFormat="dd/mm/yy"
          [showTime]="true"
          [showSeconds]="false"
          hourFormat="24"
          styleClass="w-full"
          inputStyleClass="w-full h-11 !border-gray-200 !rounded-xl !bg-gray-50/50 hover:!bg-gray-50 focus:!bg-white transition-all shadow-none text-sm"
          [appendTo]="'body'"
        ></p-datepicker>
      </div>
      <div class="md:col-span-1 xl:col-span-1 flex justify-end">
        <button
          pButton
          icon="pi pi-plus"
          class="w-11 h-11 !rounded-xl flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 !border-none text-white shadow-sm transition-all disabled:!bg-gray-200 disabled:!text-gray-400 disabled:cursor-not-allowed"
          (click)="createTask()"
          [disabled]="!newTaskTitle.trim() || !selectedAssignee"
          pTooltip="Agregar Tarea"
          tooltipPosition="left"
        ></button>
      </div>
    </div>
  </div>

  <!-- Calendario -->
  <div
    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden"
  >
    <!-- Toolbar: mes y navegación -->
    <div
      class="flex flex-wrap items-center justify-between gap-4 p-4 border-b border-gray-200 dark:border-gray-700"
    >
      <div class="flex items-center gap-2">
        <button
          type="button"
          class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300"
          (click)="prevMonth()"
          aria-label="Mes anterior"
        >
          <i class="pi pi-chevron-left"></i>
        </button>
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white min-w-[200px] text-center">
          {{ monthLabel() }}
        </h3>
        <button
          type="button"
          class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300"
          (click)="nextMonth()"
          aria-label="Mes siguiente"
        >
          <i class="pi pi-chevron-right"></i>
        </button>
      </div>
      <button
        type="button"
        class="text-sm text-orange-600 dark:text-orange-400 hover:underline"
        (click)="goToday()"
      >
        Hoy
      </button>
    </div>

    <!-- Encabezado de días de la semana -->
    <div
      class="grid grid-cols-7 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50"
    >
      @for (wd of weekdays; track wd) {
        <div
          class="p-2 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase"
        >
          {{ wd }}
        </div>
      }
    </div>

    <!-- Grilla del mes (6 filas x 7 columnas) -->
    <div class="grid grid-cols-7 auto-rows-fr min-h-[400px]">
      @for (day of calendarDays(); track day.date.getTime()) {
        <div
          class="border-b border-r border-gray-100 dark:border-gray-700/50 p-2 min-h-[100px] flex flex-col"
          [class.bg-gray-50/50]="!day.isCurrentMonth"
          [class.dark:bg-gray-900/30]="!day.isCurrentMonth"
        >
          <div
            class="text-sm font-medium mb-1"
            [class.text-gray-400]="!day.isCurrentMonth"
            [class.dark:text-gray-500]="!day.isCurrentMonth"
            [class.text-gray-900]="day.isCurrentMonth"
            [class.dark:text-gray-100]="day.isCurrentMonth"
          >
            {{ day.day }}
          </div>
          <div class="flex-1 overflow-y-auto space-y-1">
            @for (task of getTasksForDay(day); track task._id) {
              <button
                type="button"
                class="w-full text-left text-xs px-2 py-1 rounded truncate border-l-2 cursor-pointer hover:opacity-90 transition-opacity block"
                [class]="getStatusClass(task)"
                (click)="onViewTask(task, $event)"
              >
                @if (isOverdue(task)) {
                  <span class="font-semibold">Vencida:</span>
                }
                {{ task.title }}
              </button>
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>
