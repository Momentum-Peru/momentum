<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-3 sm:gap-4">
  <!-- Total Tasks -->
  <div
    class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 sm:p-5 lg:p-6 hover:shadow-md transition-shadow"
  >
    <div class="flex items-center gap-3 sm:gap-4">
      <div class="flex-shrink-0">
        <div
          class="w-10 h-10 sm:w-12 sm:h-12 bg-blue-100 dark:bg-blue-900 rounded-lg flex items-center justify-center"
        >
          <svg
            class="w-5 h-5 sm:w-6 sm:h-6 text-blue-600 dark:text-blue-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
            ></path>
          </svg>
        </div>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-xs sm:text-sm font-medium text-gray-600 dark:text-gray-400 truncate">
          Total
        </p>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 dark:text-white">
          {{ stats.total }}
        </p>
      </div>
    </div>
  </div>

  <!-- Pending Tasks -->
  <div
    class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 sm:p-5 lg:p-6 hover:shadow-md transition-shadow"
  >
    <div class="flex items-center gap-3 sm:gap-4">
      <div class="flex-shrink-0">
        <div
          class="w-10 h-10 sm:w-12 sm:h-12 bg-yellow-100 dark:bg-yellow-900 rounded-lg flex items-center justify-center"
        >
          <svg
            class="w-5 h-5 sm:w-6 sm:h-6 text-yellow-600 dark:text-yellow-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
        </div>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-xs sm:text-sm font-medium text-gray-600 dark:text-gray-400 truncate">
          Pendientes
        </p>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 dark:text-white">
          {{ stats.pending }}
        </p>
      </div>
    </div>
  </div>

  <!-- In Progress Tasks -->
  <div
    class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 sm:p-5 lg:p-6 hover:shadow-md transition-shadow"
  >
    <div class="flex items-center gap-3 sm:gap-4">
      <div class="flex-shrink-0">
        <div
          class="w-10 h-10 sm:w-12 sm:h-12 bg-blue-100 dark:bg-blue-900 rounded-lg flex items-center justify-center"
        >
          <svg
            class="w-5 h-5 sm:w-6 sm:h-6 text-blue-600 dark:text-blue-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            ></path>
          </svg>
        </div>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-xs sm:text-sm font-medium text-gray-600 dark:text-gray-400 truncate">
          En Progreso
        </p>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 dark:text-white">
          {{ stats.inProgress }}
        </p>
      </div>
    </div>
  </div>

  <!-- Completed Tasks -->
  <div
    class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 sm:p-5 lg:p-6 hover:shadow-md transition-shadow"
  >
    <div class="flex items-center gap-3 sm:gap-4">
      <div class="flex-shrink-0">
        <div
          class="w-10 h-10 sm:w-12 sm:h-12 bg-green-100 dark:bg-green-900 rounded-lg flex items-center justify-center"
        >
          <svg
            class="w-5 h-5 sm:w-6 sm:h-6 text-green-600 dark:text-green-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
        </div>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-xs sm:text-sm font-medium text-gray-600 dark:text-gray-400 truncate">
          Completadas
        </p>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 dark:text-white">
          {{ stats.completed }}
        </p>
      </div>
    </div>
  </div>

  <!-- Overdue Tasks -->
  <div
    class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 sm:p-5 lg:p-6 hover:shadow-md transition-shadow sm:col-span-2 lg:col-span-1 xl:col-span-1"
  >
    <div class="flex items-center gap-3 sm:gap-4">
      <div class="flex-shrink-0">
        <div
          class="w-10 h-10 sm:w-12 sm:h-12 bg-red-100 dark:bg-red-900 rounded-lg flex items-center justify-center"
        >
          <svg
            class="w-5 h-5 sm:w-6 sm:h-6 text-red-600 dark:text-red-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"
            ></path>
          </svg>
        </div>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-xs sm:text-sm font-medium text-gray-600 dark:text-gray-400 truncate">
          Vencidas
        </p>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 dark:text-white">
          {{ stats.overdue }}
        </p>
      </div>
    </div>
  </div>
</div>
