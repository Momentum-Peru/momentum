<div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-6 mt-4 lg:mt-0">
  <!-- Header -->
  <div class="mb-6">
    <div class="flex items-center flex-wrap gap-4 justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Tableros de Tareas</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-1">
          Organiza tus tareas en tableros colaborativos
        </p>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <p-button
            icon="pi pi-bell"
            [text]="true"
            severity="secondary"
            (onClick)="openBoardInvitations()"
            [pTooltip]="
              pendingInvitationsCount() > 0
                ? 'Tienes ' + pendingInvitationsCount() + ' invitación(es) pendiente(s)'
                : 'Ver invitaciones pendientes'
            "
          ></p-button>
          @if (pendingInvitationsCount() > 0) {
          <span
            class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"
            >{{ pendingInvitationsCount() }}</span
          >
          }
        </div>
        <p-button
          icon="pi pi-refresh"
          [text]="true"
          severity="secondary"
          (onClick)="refreshBoards()"
          [loading]="boardsService.loading()"
          pTooltip="Actualizar tableros"
        ></p-button>
        <p-button
          icon="pi pi-plus"
          label="Nuevo Tablero"
          (onClick)="openBoardForm()"
          severity="primary"
        ></p-button>
      </div>
    </div>
  </div>

  <!-- Lista de Tableros - Visible solo cuando NO hay un tablero seleccionado (ruta /tasks) -->
  @if (!selectedBoard()) {
  <div class="mb-6">
    <app-board-list
      [boards]="boardsService.boards()"
      [loading]="boardsService.loading()"
      [error]="boardsService.error()"
      [currentUserId]="currentUserId()"
      [selectedBoardId]="undefined"
      (createBoard)="openBoardForm()"
      (viewBoard)="onViewBoard($any($event))"
      (editBoard)="openBoardFormFromList($any($event))"
      (inviteUser)="openBoardInviteFromList($any($event))"
      (deleteBoard)="confirmDeleteBoard($any($event))"
    ></app-board-list>
  </div>
  }

  <!-- Vista de Tablero con Tareas - Visible solo cuando hay un tablero seleccionado (ruta /tasks/:boardId) -->
  @if (selectedBoard()) {
  <div data-board-view>
    <app-board-view
      [board]="selectedBoard()!"
      [isOwner]="isBoardOwner()"
      [tasksByStatus]="tasksByStatus()"
      [taskStats]="taskStats()"
      [loading]="tasksService.loading()"
      [availableUsers]="availableUsers()"
      [availableTags]="availableTags()"
      [currentUserId]="currentUserId()"
      (back)="onBackToBoards()"
      (edit)="openBoardForm(selectedBoard()!)"
      (invite)="openBoardInvite()"
      (refresh)="onRefreshBoard()"
      (taskStatusChanged)="onTaskStatusChanged($event)"
      (editTask)="openTaskForm($event)"
      (deleteTask)="confirmDeleteTask($event)"
      (viewTask)="viewTaskDetails($event)"
      (createTask)="openTaskForm()"
      (filtersChanged)="onFiltersChanged($event)"
      (removeMember)="onRemoveMember($event)"
      (leaveBoard)="onLeaveBoard($event)"
    ></app-board-view>
  </div>
  }
</div>

<!-- Dialog: Formulario de Tablero -->
<p-dialog
  [modal]="true"
  [visible]="showBoardForm()"
  (visibleChange)="showBoardForm.set($event)"
  [style]="{ width: '600px' }"
  [closable]="true"
  [header]="isEditingBoard() ? 'Editar Tablero' : 'Nuevo Tablero'"
>
  <app-board-form
    [board]="isEditingBoard() ? editingBoardFromList() || selectedBoard() || null : null"
    [loading]="boardFormLoading"
    [visible]="showBoardForm()"
    (save)="onBoardSave($event)"
    (cancelled)="closeBoardForm()"
  ></app-board-form>
</p-dialog>

<!-- Dialog: Invitar Usuario -->
<p-dialog
  [modal]="true"
  [visible]="showBoardInvite()"
  (visibleChange)="showBoardInvite.set($event)"
  [style]="{ width: '500px' }"
  [closable]="true"
  header="Invitar Usuario al Tablero"
>
  @if (invitingBoardFromList() || selectedBoard()) {
  <app-board-invite
    [boardId]="(invitingBoardFromList() || selectedBoard())!._id"
    [loading]="boardInviteLoading"
    [existingMemberIds]="existingMemberIds()"
    (invite)="onInviteUser($event)"
    (cancelled)="closeBoardInvite()"
  ></app-board-invite>
  }
</p-dialog>

<!-- Dialog: Formulario de Tarea -->
<p-dialog
  [modal]="true"
  [visible]="showTaskForm()"
  (visibleChange)="showTaskForm.set($event)"
  [style]="{ width: '700px' }"
  [closable]="true"
  [header]="isEditingTask() ? 'Editar Tarea' : 'Nueva Tarea'"
>
  <app-native-task-form
    [task]="selectedTask() || undefined"
    [boardId]="selectedBoard()?._id"
    (save)="onTaskSave()"
    (formCancel)="closeTaskForm()"
  ></app-native-task-form>
</p-dialog>

<!-- Confirm Dialog -->
<p-confirmDialog></p-confirmDialog>

<!-- Toast Messages -->
<p-toast [life]="5000"></p-toast>

<!-- Dialog: Detalles de Tarea -->
<app-task-details
  [task]="selectedTask()"
  [visible]="showTaskDetails()"
  (closeDialog)="closeTaskDetails()"
></app-task-details>

<!-- Dialog: Invitaciones Pendientes -->
<p-dialog
  [modal]="true"
  [visible]="showBoardInvitations()"
  (visibleChange)="showBoardInvitations.set($event)"
  [style]="{ width: '90vw', maxWidth: '1200px' }"
  [closable]="true"
  [maximizable]="true"
  header="Invitaciones Pendientes"
>
  <app-board-invitations
    [visible]="showBoardInvitations()"
    (invitationAccepted)="onInvitationAccepted($any($event))"
    (invitationRejected)="onInvitationRejected($any($event))"
  ></app-board-invitations>
</p-dialog>
