<div class="p-4 space-y-4">
  <div class="flex items-center gap-2">
    <input
      pInputText
      placeholder="Buscar"
      [ngModel]="query()"
      (ngModelChange)="setQuery($event)"
      class="w-full"
    />
    <button pButton type="button" (click)="newItem()" label="Nuevo" icon="pi pi-plus"></button>
  </div>

  <p-table [value]="items()">
    <ng-template pTemplate="header">
      <tr>
        <th>Número</th>
        <th>Cliente</th>
        <th>Tipo</th>
        <th>Docs</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.number }}</td>
        <td>{{ row.clientName }}</td>
        <td>{{ row.type }}</td>
        <td>
          <input type="file" (change)="onFileChange($event, row)" />
        </td>
        <td class="text-right">
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-text"
            (click)="editItem(row)"
          ></button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-text p-button-danger"
            (click)="remove(row)"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog
    [(visible)]="showDialog"
    [modal]="true"
    [style]="{ width: '32rem' }"
    [draggable]="false"
    [resizable]="false"
    [closable]="true"
  >
    <ng-template pTemplate="header">
      {{ editing()?._id ? 'Editar orden' : 'Nueva orden' }}
    </ng-template>
    <div class="grid gap-3">
      <p-select
        [options]="clients()"
        optionLabel="name"
        optionValue="_id"
        [ngModel]="editing()?.clientId"
        (ngModelChange)="onEditChange('clientId', $event)"
        placeholder="Selecciona cliente"
      ></p-select>
      <input
        pInputText
        placeholder="Cliente"
        [ngModel]="editing()?.clientName"
        (ngModelChange)="onEditChange('clientName', $event)"
      />
      <input
        pInputText
        placeholder="Número"
        [ngModel]="editing()?.number"
        (ngModelChange)="onEditChange('number', $event)"
      />
      <input
        pInputText
        placeholder="Tipo (purchase/service)"
        [ngModel]="editing()?.type"
        (ngModelChange)="onEditChange('type', $event)"
      />
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Cancelar" class="p-button-text" (click)="closeDialog()"></button>
      <button pButton label="Guardar" (click)="save()"></button>
    </ng-template>
  </p-dialog>
</div>
