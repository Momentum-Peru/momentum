<p-toast
  [key]="toastKey"
  position="top-right"
  [life]="defaultLife"
  [baseZIndex]="12000"
  styleClass="erp-toast-host-root"
>
  <ng-template pTemplate="message" let-msg>
    <div
      class="flex gap-3 items-start w-full min-w-0 max-w-[min(100vw-2rem,22rem)] py-0.5 pr-0.5"
      [ngClass]="accentClass(msg.severity)"
    >
      <img
        [src]="logoSrc"
        alt=""
        class="h-9 w-auto max-w-[100px] shrink-0 object-contain mt-0.5 select-none"
        width="100"
        height="36"
        loading="lazy"
        decoding="async"
      />
      <div class="min-w-0 flex-1 pt-0.5">
        <p class="text-sm font-semibold text-gray-900 leading-tight m-0">{{ msg.summary }}</p>
        @if (msg.detail) {
          <p class="text-sm text-gray-600 mt-1 mb-0 leading-snug whitespace-pre-wrap break-words">
            {{ msg.detail }}
          </p>
        }
      </div>
    </div>
  </ng-template>
</p-toast>
