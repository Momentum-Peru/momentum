<!-- Botón hamburguesa para móvil -->
<button
  class="md:hidden fixed top-2 right-2 z-50 p-2 m-6 rounded-lg bg-black text-white hover:bg-gray-800 transition-colors duration-200"
  (click)="toggleMenu()"
  [attr.aria-label]="isMenuOpen() ? 'Cerrar menú' : 'Abrir menú'"
>
  <div class="w-6 h-6 flex flex-col justify-center items-center relative">
    <span
      class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out"
      [class.rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
      [class.-mt-2]="!isMenuOpen()"
    ></span>
    <span
      class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out"
      [class.opacity-0]="isMenuOpen()"
    ></span>
    <span
      class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out"
      [class.-rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
      [class.mt-2]="!isMenuOpen()"
    ></span>
  </div>
</button>

<!-- Overlay para móvil -->
<div
  class="md:hidden fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity duration-300"
  [class.opacity-0]="!isMenuOpen()"
  [class.pointer-events-none]="!isMenuOpen()"
  [class.opacity-100]="isMenuOpen()"
  [class.pointer-events-auto]="isMenuOpen()"
  (click)="closeMenu()"
  (keyup.enter)="closeMenu()"
  (keyup.escape)="closeMenu()"
  tabindex="0"
  role="button"
  [attr.aria-label]="'Cerrar menú'"
></div>

<!-- Menú lateral -->
<nav
  class="pt-7 fixed md:static top-0 left-0 h-full max-h-screen w-60 bg-black text-white z-50 transform transition-transform duration-300 ease-in-out md:transform-none flex flex-col"
  [class.-translate-x-full]="!isMenuOpen()"
  [class.translate-x-0]="isMenuOpen()"
>
  <div class="md:hidden flex justify-center items-center p-4 flex-shrink-0">
    <img width="120" src="/images/logo_b.png" alt="Logo" />
  </div>

  <!-- Items del menú -->
  <div class="flex-1 min-h-0 overflow-y-auto flex flex-col space-y-1 p-2 pb-24">
    @if (isLoadingPermissions()) {
      <div class="text-center py-8">
        <i class="pi pi-spin pi-spinner text-4xl text-gray-400 mb-3"></i>
        <p class="text-gray-300 text-sm">Cargando permisos...</p>
      </div>
    } @else if (hasAnyPermission()) {
      @for (item of sidebarItems(); track item.routerLink) {
        <a
          [routerLink]="item.routerLink"
          class="menu-item-link flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 text-white"
          [class.menu-item-active]="item.isHub ? isGroupActive(item.hubKey) : isActiveRoute(item.routerLink)"
          [routerLinkActive]="item.isHub ? '' : 'menu-item-active'"
          [routerLinkActiveOptions]="{ exact: item.routerLink === '/dashboard' }"
          (click)="closeMenu()"
        >
          <i [class]="item.icon + ' text-lg transition-transform duration-200 menu-item-icon'"></i>
          <span class="font-medium menu-item-text">{{ item.label }}</span>
          @if (item.isHub) {
            <i class="pi pi-angle-right ml-auto text-xs opacity-50"></i>
          }
        </a>
      }
    } @else {
      <div class="text-center py-8">
        <i class="pi pi-lock text-4xl text-gray-400 mb-3"></i>
        <p class="text-gray-300 text-sm">Sin permisos de acceso</p>
        <p class="text-gray-400 text-xs mt-1">Contacta al administrador</p>
      </div>
    }
  </div>

  <!-- Footer del menú -->
  <div
    class="md:hidden w-full flex flex-col justify-center items-center pb-4 md:pb-0 flex-shrink-0"
  >
    <!-- Información del usuario y botón de cerrar sesión solo en móvil -->
    <div class="text-center mb-3">
      <div class="text-sm text-gray-300 mb-1">Conectado como:</div>
      <div class="text-white font-semibold text-lg">{{ userName() }}</div>
    </div>

    <!-- Botón de cerrar sesión -->
    <p-button
      label="Cerrar Sesión"
      class="text-black"
      severity="secondary"
      icon="pi pi-sign-out"
      (onClick)="onLogout()"
    />
  </div>
</nav>
