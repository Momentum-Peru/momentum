<!-- Botón hamburguesa para móvil -->
<button
  class="m-4 md:hidden fixed top-4 right-4 z-50 p-2 rounded-lg bg-black text-white hover:bg-gray-800 transition-colors duration-200"
  (click)="toggleMenu()"
  [attr.aria-label]="isMenuOpen() ? 'Cerrar menú' : 'Abrir menú'"
>
  <div class="w-6 h-6 flex flex-col justify-center items-center relative">
    <span
      class="block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out absolute"
      [class.rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
    ></span>
    <span
      class="block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out"
      [class.opacity-0]="isMenuOpen()"
    ></span>
    <span
      class="block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out absolute"
      [class.-rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
    ></span>
  </div>
</button>

<!-- Overlay para móvil -->
<div
  class="md:hidden fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity duration-300"
  [class.opacity-0]="!isMenuOpen()"
  [class.pointer-events-none]="!isMenuOpen()"
  [class.opacity-100]="isMenuOpen()"
  [class.pointer-events-auto]="isMenuOpen()"
  (click)="closeMenu()"
></div>

<!-- Menú lateral -->
<nav
  class="pt-7 fixed md:static top-0 left-0 h-full w-60 bg-black text-white z-50 transform transition-transform duration-300 ease-in-out md:transform-none"
  [class.-translate-x-full]="!isMenuOpen()"
  [class.translate-x-0]="isMenuOpen()"
>
  <div class="md:hidden flex justify-center items-center p-4">
    <img width="120" src="/images/logo_b.png" alt="Logo" />
  </div>

  <!-- Items del menú -->
  <div class="flex flex-col space-y-2 p-4">
    @for (item of menuItems(); track item.link) {
    <a
      [href]="item.link"
      class="flex items-center space-x-3 px-4 py-3 text-white hover:bg-white hover:bg-opacity-10 rounded-lg transition-all duration-200 group"
      (click)="closeMenu()"
    >
      <i
        [class]="item.icon + ' text-lg group-hover:scale-110 transition-transform duration-200'"
      ></i>
      <span class="font-medium">{{ item.label }}</span>
    </a>
    }
  </div>

  <!-- Footer del menú -->
  <div class="absolute bottom-4 w-full flex flex-col justify-center items-center">
    <!-- Botón de cerrar sesión solo en móvil -->
    <div class="mb-4 md:hidden">
      <p-button
        label="Cerrar Sesión"
        class="text-black w-full"
        severity="secondary"
        (onClick)="onLogout()"
      />
    </div>

    <div class="text-xs text-gray-400 text-center">© Maya Agent 2025</div>
  </div>
</nav>
