<!-- Botón hamburguesa para móvil -->
<button
  class="m-3 md:hidden fixed top-2 right-2 z-50 p-2 rounded-lg bg-black text-white hover:bg-gray-800 transition-colors duration-200"
  (click)="toggleMenu()"
  [attr.aria-label]="isMenuOpen() ? 'Cerrar menú' : 'Abrir menú'"
>
  <div class="w-6 h-6 flex flex-col justify-center items-center relative">
    <span
      class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out"
      [class.rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
      [class.-mt-2]="!isMenuOpen()"
    ></span>
    <span
      class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out"
      [class.opacity-0]="isMenuOpen()"
    ></span>
    <span
      class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 block w-5 h-0.5 bg-white transition-all duration-300 ease-in-out"
      [class.-rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
      [class.mt-2]="!isMenuOpen()"
    ></span>
  </div>
</button>

<!-- Overlay para móvil -->
<div
  class="md:hidden fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity duration-300"
  [class.opacity-0]="!isMenuOpen()"
  [class.pointer-events-none]="!isMenuOpen()"
  [class.opacity-100]="isMenuOpen()"
  [class.pointer-events-auto]="isMenuOpen()"
  (click)="closeMenu()"
></div>

<!-- Menú lateral -->
<nav
  class="pt-7 fixed md:static top-0 left-0 h-full w-60 bg-black text-white z-50 transform transition-transform duration-300 ease-in-out md:transform-none flex flex-col"
  [class.-translate-x-full]="!isMenuOpen()"
  [class.translate-x-0]="isMenuOpen()"
>
  <div class="md:hidden flex justify-center items-center p-4">
    <img width="120" src="/images/logo_b.png" alt="Logo" />
  </div>

  <!-- Items del menú -->
  <div class="flex-1 overflow-y-auto flex flex-col space-y-2 p-4 pb-24">
    @if (hasAnyPermission()) { @for (item of menuItems(); track item.path) {
    <a
      [routerLink]="item.path"
      [class]="
        'flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 group ' +
        (isActiveRoute(item.path)
          ? 'bg-white bg-opacity-20 text-white border-l-4 border-white'
          : 'text-white hover:bg-white hover:bg-opacity-10')
      "
      (click)="closeMenu()"
    >
      <i
        [class]="item.icon + ' text-lg group-hover:scale-110 transition-transform duration-200'"
      ></i>
      <span class="font-medium">{{ item.label }}</span>
      @if (isActiveRoute(item.path)) {
      <i class="pi pi-check ml-auto text-sm"></i>
      }
    </a>
    } } @else {
    <div class="text-center py-8">
      <i class="pi pi-lock text-4xl text-gray-400 mb-3"></i>
      <p class="text-gray-300 text-sm">Sin permisos de acceso</p>
      <p class="text-gray-400 text-xs mt-1">Contacta al administrador</p>
    </div>
    }
  </div>

  <!-- Footer del menú -->
  <div class="mt-auto w-full flex flex-col justify-center items-center pb-4 md:pb-0">
    <!-- Información del usuario y botón de cerrar sesión solo en móvil -->
    <div class="mb-4 md:hidden w-full px-4">
      <!-- Nombre de usuario -->
      <div class="text-center mb-3">
        <div class="text-sm text-gray-300 mb-1">Conectado como:</div>
        <div class="text-white font-semibold text-lg">{{ userName() }}</div>
        <!-- Debug info - remover en producción -->
        <!-- <div class="text-xs text-gray-400 mt-1">
          Debug:
          {{
            authService.getCurrentUser()?.name ||
              authService.getCurrentUser()?.email ||
              'Sin usuario'
          }}
        </div> -->
        <!-- <button class="text-xs text-blue-300 underline mt-1" (click)="refreshUserInfo()">
          Refrescar
        </button> -->
      </div>

      <!-- Botón de cerrar sesión -->
      <p-button
        label="Cerrar Sesión"
        class="text-black w-full"
        severity="secondary"
        icon="pi pi-sign-out"
        (onClick)="onLogout()"
      />
    </div>

    <div class="text-xs text-gray-400 text-center">© Maya Agent 2025</div>
  </div>
</nav>
