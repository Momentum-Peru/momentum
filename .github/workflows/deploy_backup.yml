name: Deploy erpmomentum.com → S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration=production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync hashed assets (long-lived cache)
        run: |
          aws s3 sync ./dist/momentum/browser s3://tecmeing-bucket-aws \
            --delete \
            --exclude "index.html" \
            --cache-control "max-age=31536000,immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp ./dist/momentum/browser/index.html s3://tecmeing-bucket-aws/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EGH0ZDJVBXGMH \
            --paths "/index.html"
